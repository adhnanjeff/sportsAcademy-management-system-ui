<!-- Mobile Overlay -->
@if (isMobileOpen) {
  <div class="sidebar-overlay" (click)="closeMobile()"></div>
}

<aside class="sidebar" [class.collapsed]="isCollapsed" [class.mobile-open]="isMobileOpen">
  <!-- Mobile Close Button -->
  <button class="mobile-close" (click)="closeMobile()">
    <i class="fa-solid fa-xmark"></i>
  </button>
  
  <!-- Navigation -->
  <nav class="sidebar-nav">
    @for (item of navItems; track item.id) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard/home' }"
        class="nav-item"
        [class.has-tooltip]="isCollapsed"
        [attr.data-tooltip]="isCollapsed ? item.label : null"
        (click)="onNavClick()"
      >
        @if (item.iconImage) {
          <img [src]="item.iconImage" [alt]="item.label + ' icon'" class="nav-icon-image" />
        } @else {
          <i [class]="item.icon"></i>
        }
        @if (!isCollapsed || isMobileOpen) {
          <span class="nav-label">{{ item.label }}</span>
          @if (item.badge) {
            <span class="nav-badge" [style.backgroundColor]="item.badgeColor || 'var(--danger-color)'">
              {{ item.badge }}
            </span>
          }
        }
      </a>
    }
  </nav>

  <!-- Bottom Section -->
  <div class="sidebar-bottom">
    <a
      routerLink="/dashboard/settings"
      routerLinkActive="active"
      class="nav-item"
      [class.has-tooltip]="isCollapsed"
      [attr.data-tooltip]="isCollapsed ? 'Settings' : null"
      (click)="onNavClick()"
    >
      <i class="fa-solid fa-gear"></i>
      @if (!isCollapsed || isMobileOpen) {
        <span class="nav-label">Settings</span>
      }
    </a>
    
    <button
      class="nav-item logout-btn"
      [class.has-tooltip]="isCollapsed"
      [attr.data-tooltip]="isCollapsed ? 'Logout' : null"
      (click)="onLogout()"
    >
      <i class="fa-solid fa-right-from-bracket"></i>
      @if (!isCollapsed || isMobileOpen) {
        <span class="nav-label">Logout</span>
      }
    </button>
  </div>
</aside>
